<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing Tokens" subtitle="Spacing scale: 4px base unit, 4–128px range" viewport="700x160" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fbf3e7; padding: 20px; font-family: 'Helvetica Neue', sans-serif; }
  .grid { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
  .token { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: #10312b; width: 32px; border-radius: 2px; }
  .name { font-size: 9px; font-weight: 600; color: #4a4f31; letter-spacing: 0.06em; text-transform: uppercase; }
  .val { font-size: 9px; color: #c8a977; font-family: monospace; }
</style>
</head>
<body>
  <div class="grid">
    <div class="token"><div class="bar" style="height:4px;"></div><div class="name">–1</div><div class="val">4px</div></div>
    <div class="token"><div class="bar" style="height:8px;"></div><div class="name">–2</div><div class="val">8px</div></div>
    <div class="token"><div class="bar" style="height:12px;"></div><div class="name">–3</div><div class="val">12px</div></div>
    <div class="token"><div class="bar" style="height:16px;"></div><div class="name">–4</div><div class="val">16px</div></div>
    <div class="token"><div class="bar" style="height:20px;"></div><div class="name">–5</div><div class="val">20px</div></div>
    <div class="token"><div class="bar" style="height:24px;"></div><div class="name">–6</div><div class="val">24px</div></div>
    <div class="token"><div class="bar" style="height:32px;"></div><div class="name">–8</div><div class="val">32px</div></div>
    <div class="token"><div class="bar" style="height:40px;"></div><div class="name">–10</div><div class="val">40px</div></div>
    <div class="token"><div class="bar" style="height:48px;"></div><div class="name">–12</div><div class="val">48px</div></div>
    <div class="token"><div class="bar" style="height:64px;"></div><div class="name">–16</div><div class="val">64px</div></div>
    <div class="token"><div class="bar" style="height:80px;"></div><div class="name">–20</div><div class="val">80px</div></div>
    <div class="token"><div class="bar" style="height:96px;"></div><div class="name">–24</div><div class="val">96px</div></div>
  </div>
</body>
</html>
