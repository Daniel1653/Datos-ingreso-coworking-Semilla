<!DOCTYPE html>
<!-- @dsCard group="Type" name="Type Weights" subtitle="Betm — all 8 weights, Thin through ExtraBlack" viewport="700x250" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @font-face { font-family: 'Betm'; src: url('../fonts/Betm-Thin.otf'); font-weight: 100; }
  @font-face { font-family: 'Betm'; src: url('../fonts/Betm-Light.otf'); font-weight: 300; }
  @font-face { font-family: 'Betm'; src: url('../fonts/Betm-Regular.otf'); font-weight: 400; }
  @font-face { font-family: 'Betm'; src: url('../fonts/Betm-Medium.otf'); font-weight: 500; }
  @font-face { font-family: 'Betm'; src: url('../fonts/Betm-SemiBold.otf'); font-weight: 600; }
  @font-face { font-family: 'Betm'; src: url('../fonts/Betm-Bold.otf'); font-weight: 700; }
  @font-face { font-family: 'Betm'; src: url('../fonts/Betm-Black.otf'); font-weight: 900; }
  @font-face { font-family: 'Betm'; src: url('../fonts/Betm-ExtraBlack.otf'); font-weight: 950; }
  body { background: #10312b; padding: 20px 28px; font-family: 'Betm', sans-serif; }
  .row { display: flex; align-items: baseline; gap: 20px; padding: 5px 0; }
  .tag { width: 110px; font-size: 9px; color: #c8a977; letter-spacing: 0.10em; text-transform: uppercase; font-family: monospace; flex-shrink: 0; }
  .word { font-size: 22px; color: #fff; letter-spacing: 0.14em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row"><div class="tag">Thin 100</div><div class="word" style="font-weight:100;">Semilla</div></div>
  <div class="row"><div class="tag">Light 300</div><div class="word" style="font-weight:300;">Semilla</div></div>
  <div class="row"><div class="tag">Regular 400</div><div class="word" style="font-weight:400;">Semilla</div></div>
  <div class="row"><div class="tag">Medium 500</div><div class="word" style="font-weight:500;">Semilla</div></div>
  <div class="row"><div class="tag">SemiBold 600</div><div class="word" style="font-weight:600;">Semilla</div></div>
  <div class="row"><div class="tag">Bold 700</div><div class="word" style="font-weight:700;">Semilla</div></div>
  <div class="row"><div class="tag">Black 900</div><div class="word" style="font-weight:900;">Semilla</div></div>
  <div class="row"><div class="tag">ExtraBlack 950</div><div class="word" style="font-weight:950;">Semilla</div></div>
</body>
</html>
