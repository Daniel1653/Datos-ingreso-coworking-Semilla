<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Color Combinations" subtitle="12 approved brand color pairings across all 4 brand colors" viewport="700x310" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @font-face { font-family: 'Betm'; src: url('../fonts/Betm-SemiBold.otf'); font-weight: 600; }
  @font-face { font-family: 'Betm'; src: url('../fonts/Betm-Light.otf'); font-weight: 300; }
  body { font-family: 'Betm', 'Helvetica Neue', sans-serif; padding: 16px; background: #e8e0d4; }
  .row { display: flex; gap: 6px; margin-bottom: 6px; }
  .combo {
    flex: 1; padding: 16px 14px 12px;
    display: flex; flex-direction: column; justify-content: space-between;
    min-height: 86px;
  }
  .combo-title { font-size: 13px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; line-height: 1; }
  .combo-sub { font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 300; opacity: 0.65; margin-top: 6px; }
  .combo-swatch { display: flex; gap: 3px; margin-top: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; opacity: 0.5; }
</style>
</head>
<body>

  <!-- Row 1 -->
  <div class="row">
    <div class="combo" style="background:#102621; color:#fff;">
      <div>

  </div>
