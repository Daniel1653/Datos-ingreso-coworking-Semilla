<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Logo — Icon & Badge" subtitle="S-mark icon in 5 variants + circular badge mark" viewport="700x140" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Helvetica Neue', sans-serif; background: #f5f5f5; padding: 16px; }
  .row { display: flex; gap: 8px; }
  .tile { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 16px 8px; }
  .tile img { height: 64px; object-fit: contain; }
  .label { font-size: 9px; letter-spacing: 0.10em; text-transform: uppercase; color: #737373; text-align: center; }
</style>
</head>
<body>
  <div class="row">
    <div class="tile" style="background:#fff;">
      <img src="../assets/logo-icon-black.png" alt="Icon black">
      <div class="label">Black / White</div>
    </div>
    <div class="tile" style="background:#10312b;">
      <img src="../assets/logo-icon-white-on-forest.png" alt="Icon white on forest">
      <div class="label" style="color:#a8cfc5;">White / Forest</div>
    </div>
    <div class="tile" style="background:#c8a977;">
      <img src="../assets/logo-icon-white-on-gold.png" alt="Icon white on gold">
      <div class="label" style="color:#fff;">White / Gold</div>
    </div>
    <div class="tile" style="background:#4a4f31;">
      <img src="../assets/logo-icon-white-on-olive.png" alt="Icon white on olive">
      <div class="label" style="color:#dde0c8;">White / Olive</div>
    </div>
    <div class="tile" style="background:#fbf3e7;">
      <img src="../assets/logo-icon-olive-on-cream.png" alt="Icon olive on cream">
      <div class="label">Olive / Cream</div>
    </div>
    <div class="tile" style="background:#ffffff; border: 1px solid #dcdec8;">
      <img src="../assets/logo-badge-forest.png" alt="Badge">
      <div class="label">Badge Mark</div>
    </div>
  </div>
</body>
</html>
