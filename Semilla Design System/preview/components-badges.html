<!DOCTYPE html>
<!-- @dsCard group="Components" name="Badges & Tags" subtitle="Badges, pill tags, and dot-divider label patterns" viewport="700x180" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @font-face { font-family: 'Betm'; src: url('../fonts/Betm-SemiBold.otf'); font-weight: 600; }
  @font-face { font-family: 'Betm'; src: url('../fonts/Betm-Medium.otf'); font-weight: 500; }
  @font-face { font-family: 'Betm'; src: url('../fonts/Betm-Light.otf'); font-weight: 300; }
  body { background: #fbf3e7; padding: 24px; font-family: 'Betm', sans-serif; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
  .row-label { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: #a8a8a8; width: 56px; flex-shrink: 0; }
  .badge {
    display: inline-block;
    font-size: 9px; font-weight: 600; letter-spacing: 0.18em;
    text-transform: uppercase; padding: 4px 12px;
  }
  .tag {
    display: inline-block;
    font-size: 9px; font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 5px 14px; border-radius: 9999px;
  }
  .divider { font-size: 11px; font-weight: 300; letter-spacing: 0.22em; text-transform: uppercase; color: #10312b; }
  .dot { display: inline-block; width: 4px; height: 4px; background: #c8a977; border-radius: 50%; margin: 0 8px; vertical-align: middle; }
</style>
</head>
<body>
  <div class="row">
    <div class="row-label">Solid</div>
    <span class="badge" style="background:#10312b; color:#fff;">Change Maker</span>
    <span class="badge" style="background:#c8a977; color:#fff;">Featured</span>
    <span class="badge" style="background:#4a4f31; color:#fbf3e7;">Coworking</span>
    <span class="badge" style="background:#fbf3e7; color:#10312b; border:1px solid #10312b;">Café</span>
  </div>
  <div class="row">
    <div class="row-label">Pill tags</div>
    <span class="tag" style="background:#d4ebe6; color:#10312b;">Networking</span>
    <span class="tag" style="background:#f3e8d2; color:#7a5f2c;">Events</span>
    <span class="tag" style="background:#dde0c8; color:#3d421e;">Startup</span>
    <span class="tag" style="background:#10312b; color:#fbf3e7;">Nomads</span>
    <span class="tag" style="background:#c8a977; color:#fff;">Coffice</span>
  </div>
  <div class="row">
    <div class="row-label">Dividers</div>
    <span class="divider">Med</span>
    <span class="dot"></span>
    <span class="divider">Col</span>
    <span class="dot"></span>
    <span class="divider">Laureles</span>
    <span class="dot"></span>
    <span class="divider">2026</span>
  </div>
</body>
</html>
