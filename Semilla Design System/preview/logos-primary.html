<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Logo — Primary" subtitle="Full wordmark lockup — 4 approved color variants" viewport="700x150" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Helvetica Neue', sans-serif; background: #f5f5f5; padding: 16px; }
  .row { display: flex; gap: 8px; }
  .tile { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 20px 12px; }
  .tile img { height: 72px; object-fit: contain; }
  .label { font-size: 9px; letter-spacing: 0.10em; text-transform: uppercase; color: #737373; }
</style>
</head>
<body>
  <div class="row">
    <div class="tile" style="background:#fbf0e0;">
      <img src="../assets/logo-full-black.png" alt="Full logo black" style="mix-blend-mode:multiply;">
      <div class="label">Black / Cream</div>
    </div>
    <div class="tile" style="background:#10312b;">
      <img src="../assets/logo-full-white-on-forest.png" alt="Full logo white on forest">
      <div class="label" style="color:#a8cfc5;">White / Forest</div>
    </div>
    <div class="tile" style="background:#c8a977;">
      <img src="../assets/logo-full-white-on-gold.png" alt="Full logo white on gold">
      <div class="label" style="color:#fff;">White / Gold</div>
    </div>
    <div class="tile" style="background:#fbf3e7;">
      <img src="../assets/logo-full-olive-on-cream.png" alt="Full logo olive on cream">
      <div class="label">Olive / Cream</div>
    </div>
  </div>
</body>
</html>
