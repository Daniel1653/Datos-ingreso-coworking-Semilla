<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Brand Colors" subtitle="6-color brand palette: Forest #102621, Olive #4e502a, Gold #c09762, Cream #fbf0e0" viewport="700x150" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fbf3e7; padding: 20px; }
  .row { display: flex; gap: 10px; margin-bottom: 10px; }
  .swatch { flex: 1; border-radius: 4px; overflow: hidden; }
  .color-block { height: 72px; }
  .info { padding: 8px 10px; background: white; border: 1px solid #ede0c8; }
  .name { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: #10312b; }
  .hex { font-size: 10px; color: #737373; margin-top: 2px; font-family: monospace; }
  .role { font-size: 9px; color: #a8a8a8; margin-top: 2px; letter-spacing: 0.04em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="swatch">
      <div class="color-block" style="background:#102621;"></div>
      <div class="info"><div class="name">Forest</div><div class="hex">#102621</div><div class="role">Primary dark</div></div>
    </div>
    <div class="swatch">
      <div class="color-block" style="background:#4e502a;"></div>
      <div class="info"><div class="name">Olive</div><div class="hex">#4E502A</div><div class="role">Secondary green</div></div>
    </div>
    <div class="swatch">
      <div class="color-block" style="background:#c09762;"></div>
      <div class="info"><div class="name">Gold</div><div class="hex">#C09762</div><div class="role">Warm accent</div></div>
    </div>
    <div class="swatch">
      <div class="color-block" style="background:#fbf0e0; border: 1px solid #e8dcc8;"></div>
      <div class="info"><div class="name">Cream</div><div class="hex">#FBF0E0</div><div class="role">Background</div></div>
    </div>
    <div class="swatch">
      <div class="color-block" style="background:#0a0a0a;"></div>
      <div class="info"><div class="name">Black</div><div class="hex">#0A0A0A</div><div class="role">Contrast</div></div>
    </div>
    <div class="swatch">
      <div class="color-block" style="background:#ffffff; border: 1px solid #e8dcc8;"></div>
      <div class="info"><div class="name">White</div><div class="hex">#FFFFFF</div><div class="role">Surface</div></div>
    </div>
  </div>
</body>
</html>
