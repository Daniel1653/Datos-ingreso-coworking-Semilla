<!DOCTYPE html>
<!-- @dsCard group="UI Kit — Website" name="Semilla Website UI Kit" subtitle="Full clickable website prototype — Hero, Coffice, Plans, Events, Footer" viewport="1440x900" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Semilla — Café & Coworking</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<style>
  @font-face { font-family: 'Betm'; src: url('../../fonts/Betm-ExtraBlack.otf'); font-weight: 950; }
  @font-face { font-family: 'Betm'; src: url('../../fonts/Betm-Black.otf'); font-weight: 900; }
  @font-face { font-family: 'Betm'; src: url('../../fonts/Betm-Bold.otf'); font-weight: 700; }
  @font-face { font-family: 'Betm'; src: url('../../fonts/Betm-SemiBold.otf'); font-weight: 600; }
  @font-face { font-family: 'Betm'; src: url('../../fonts/Betm-Medium.otf'); font-weight: 500; }
  @font-face { font-family: 'Betm'; src: url('../../fonts/Betm-Regular.otf'); font-weight: 400; }
  @font-face { font-family: 'Betm'; src: url('../../fonts/Betm-Light.otf'); font-weight: 300; }
  @font-face { font-family: 'Betm'; src: url('../../fonts/Betm-Thin.otf'); font-weight: 100; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Betm', 'Helvetica Neue', sans-serif; background: #fbf0e0; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const NAV_ITEMS = ['coworking', 'café', 'eventos', 'comunidad'];

function Modal({ plan, onClose }) {
  if (!plan) return null;
  return React.createElement('div', {
    onClick: onClose,
    style: {
      position: 'fixed', inset: 0, background: 'rgba(16,38,33,0.75)',
      zIndex: 200, display: 'flex', alignItems: 'center', justifyContent: 'center',
      backdropFilter: 'blur(4px)'
    }
  },
    React.createElement('div', {
      onClick: e => e.stopPropagation(),
      style: {
        background: '#fbf0e0', padding: '48px 48px 40px', maxWidth: 480, width: '90%',
        position: 'relative'
      }
    },
      React.createElement('button', {
        onClick: onClose,
        style: {
          position: 'absolute', top: 16, right: 20, background: 'none', border: 'none',
          fontFamily: 'Betm, sans-serif', fontSize: 11, letterSpacing: '0.14em',
          textTransform: 'uppercase', color: '#102621', cursor: 'pointer'
        }
      }, '× Cerrar'),
      React.createElement('div', {
        style: {
          fontFamily: 'Betm, sans-serif', fontWeight: 400,
          fontSize: 9, letterSpacing: '0.22em', textTransform: 'uppercase',
          color: '#c09762', marginBottom: 12
        }
      }, 'Plan Seleccionado'),
      React.createElement('h2', {
        style: {
          fontFamily: 'Betm, sans-serif', fontWeight: 900,
          fontSize: 36, letterSpacing: '0.18em', textTransform: 'uppercase',
          color: '#102621', marginBottom: 24
        }
      }, plan),
      React.createElement('p', {
        style: {
          fontFamily: 'Betm, sans-serif', fontWeight: 300,
          fontSize: 14, lineHeight: 1.7, color: '#4e502a', marginBottom: 32
        }
      }, 'Completa tus datos y uno de nuestros hosts se pondrá en contacto contigo en menos de 24 horas.'),
      React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: 14, marginBottom: 28 } },
        ...['Nombre completo', 'Correo electrónico', 'WhatsApp'].map(p =>
          React.createElement('input', {
            key: p,
            placeholder: p,
            style: {
              fontFamily: 'Betm, sans-serif', fontWeight: 300,
              fontSize: 13, padding: '12px 14px',
              border: '1px solid #102621', background: '#fff',
              color: '#102621', outline: 'none'
            }
          })
        )
      ),
      React.createElement('button', {
        onClick: onClose,
        style: {
          width: '100%',
          fontFamily: 'Betm, sans-serif', fontWeight: 600,
          fontSize: 10, letterSpacing: '0.20em', textTransform: 'uppercase',
          background: '#102621', color: '#fff',
          border: 'none', padding: '16px', cursor: 'pointer'
        }
      }, 'Solicitar mi Lugar')
    )
  );
}

function App() {
  const [page, setPage] = React.useState('home');
  const [selectedPlan, setSelectedPlan] = React.useState(null);

  const handleNavigate = (dest) => {
    if (dest === 'reservar' || dest === 'coworking') {
      document.getElementById('plans-section')?.scrollIntoView({ behavior: 'smooth' });
    } else if (dest === 'café') {
      document.getElementById('coffice-section')?.scrollIntoView({ behavior: 'smooth' });
    } else if (dest === 'eventos') {
      document.getElementById('events-section')?.scrollIntoView({ behavior: 'smooth' });
    }
    setPage(dest);
  };

  return React.createElement(React.Fragment, null,
    React.createElement(Header, { activePage: page, onNavigate: handleNavigate }),
    React.createElement('main', null,
      React.createElement(Hero, { onCTA: () => handleNavigate('coworking') }),
      React.createElement('div', { id: 'coffice-section' },
        React.createElement(CofficeSection)
      ),
      React.createElement('div', { id: 'plans-section' },
        React.createElement(PlansSection, { onSelectPlan: setSelectedPlan })
      ),
      React.createElement('div', { id: 'events-section' },
        React.createElement(EventsStrip)
      )
    ),
    React.createElement(Footer),
    React.createElement(Modal, { plan: selectedPlan, onClose: () => setSelectedPlan(null) })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
